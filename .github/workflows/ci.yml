name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: git-actions-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: git-actions-demo/package-lock.json
      - run: npm ci
      - run: npm test

  hello:
    name: Say hello (after tests)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Hello
        run: echo "Hello 👋 (this job runs after tests)"

  wait:
    name: Demo wait (3 min)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Wait 3 minutes
        run: sleep 180
      - name: Done
        run: echo "✅ Finished demo wait"
